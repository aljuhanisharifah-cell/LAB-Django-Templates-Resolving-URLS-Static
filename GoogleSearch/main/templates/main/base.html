{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Google{% endblock %}</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <link rel="stylesheet" href="{% static 'css/style.css' %}?v=1.2">
</head>
<body>

    <nav>
        <a href="#">Gmail</a>
        <a href="#">Images</a>
        <span class="material-icons " style="color: #5f6368; font-size: 24px; cursor: pointer;">apps</span>
        <button class="signin-btn">Sign in</button>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

  
    <footer>
        <div class="footer-top">
            Saudi Arabia
        </div>
        <div class="footer-bottom">
            <div class="footer-left">
                <a href="#">About</a>
                <a href="#">Advertising</a>
                <a href="#">Business</a>
                <a href="#">How Search works</a>
            </div>
            <div class="footer-right">
                <a href="#">Privacy</a>
                <a href="{% url 'main:terms_view' %}">Terms</a>
                <a href="#">Settings</a>
            </div>
        </div>
    </footer>


</body>
</html>
